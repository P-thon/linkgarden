
<!DOCTYPE html> {% load static %}
{% spaceless %}
<html lang = "fr-FR">
    <head>
        <title>{{ default_title }}</title>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="icon" type="img/ico" href="{% static 'listings/IMG/favicon.ico' %}">
        {% block head_inject %}{% endblock head_inject %}
        <link rel="stylesheet" href="{% static 'listings/CSS/ADMIN/admin-default.css'%}"/>
    </head>
    <body>
        <section id="sidebar" class = "hide">
            <a class="brand">
                <i style="margin-top: 20px; margin-left:5px;"><img src="{% static 'listings/IMG/favicon.ico'%}" class="mainlogo"></i>
            </a>
            <ul class="side-menu top">
                <li>
                    <a href = "{% url 'admin'%}">
                        <svg class = "bx" version="1.0" xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" viewBox="0 0 90.000000 90.000000" preserveAspectRatio="xMidYMid meet"><g transform="translate(0.000000,90.000000) scale(0.100000,-0.100000)"fill="#ffffff" stroke="none"><path d="M349 767 c-108 -31 -199 -108 -251 -215 -30 -61 -33 -74 -33 -162 0 -81 4 -103 26 -150 14 -30 38 -70 53 -88 l28 -32 277 0 277 0 27 28 c14 15 38 54 54 87 24 52 28 72 28 155 0 86 -3 101 -31 160 -64 136 -186 218 -332 226 -45 2 -96 -1 -123 -9z m126 -77 c0 -18 -6 -26 -23 -28 -24 -4 -38 18 -28 44 3 9 15 14 28 12 17 -2 23 -10 23 -28z m-150 -40 c0 -18 -6 -26 -23 -28 -24 -4 -38 18 -28 44 3 9 15 14 28 12 17 -2 23 -10 23 -28z m300 0 c0 -18 -6 -26 -23 -28 -24 -4 -38 18 -28 44 3 9 15 14 28 12 17 -2 23 -10 23 -28z m-410 -110 c0 -18 -6 -26 -23 -28 -13 -2 -25 3 -28 12 -10 26 4 48 28 44 17 -2 23 -10 23 -28z m485 -13 c0 -13 -152 -142 -212 -181 -35 -23 -75 -14 -90 19 -22 49 -1 68 139 124 134 53 163 60 163 38z m-525 -137 c0 -18 -6 -26 -23 -28 -24 -4 -38 18 -28 44 3 9 15 14 28 12 17 -2 23 -10 23 -28z m600 0 c0 -18 -6 -26 -23 -28 -13 -2 -25 3 -28 12 -10 26 4 48 28 44 17 -2 23 -10 23 -28z m-560 -150 c0 -18 -6 -26 -23 -28 -13 -2 -25 3 -28 12 -10 26 4 48 28 44 17 -2 23 -10 23 -28z m520 0 c0 -18 -6 -26 -23 -28 -24 -4 -38 18 -28 44 3 9 15 14 28 12 17 -2 23 -10 23 -28z"/></g></svg>
                        <span class="text">DASHBOARD</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'logout'%}" class="logout">
                        <svg class = "bx" version="1.0" xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" viewBox="0 0 90.000000 90.000000"preserveAspectRatio="xMidYMid meet"><g transform="translate(0.000000,90.000000) scale(0.100000,-0.100000)"fill="var(--red)" stroke="none"> <path d="M110 790 c-19 -19 -20 -33 -20 -340 0 -307 1 -321 20 -340 19 -19 33 -20 250 -20 292 0 270 -15 270 185 l0 145 82 0 82 0 -38 -39 c-40 -41 -45 -73 -12 -79 22 -5 156 123 156 148 0 25 -134 153 -156 148 -33 -6 -28 -38 12 -79 l38 -39 -82 0 -82 0 0 145 c0 200 22 185 -270 185 -217 0 -231 -1 -250 -20z m520 -340 l0 -30 -130 0 c-136 0 -152 5 -136 45 4 12 29 15 136 15 l130 0 0 -30z"/></g></svg>
                        <span class="text">LOGOUT</span>
                    </a>
                </li>
            </ul>
        </section>
        <section id="content">
            <nav>
                <i class='bx bx-menu'><svg version="1.0" xmlns="http://www.w3.org/2000/svg"width="20px" height="20px" viewBox="0 0 90.000000 90.000000" preserveAspectRatio="xMidYMid meet"><g transform="translate(0.000000,90.000000) scale(0.100000,-0.100000)" fill="#ffffff" stroke="none"><path d="M64 675 c-4 -8 -4 -22 0 -30 5 -13 54 -15 388 -13 l383 3 0 25 0 25 -383 3 c-334 2 -383 0 -388 -13z"/> <path d="M64 465 c-4 -8 -4 -22 0 -30 5 -13 54 -15 388 -13 l383 3 0 25 0 25 -383 3 c-334 2 -383 0 -388 -13z"/> <path d="M64 255 c-4 -8 -4 -22 0 -30 5 -13 54 -15 388 -13 l383 3 0 25 0 25 -383 3 c-334 2 -383 0 -388 -13z"/></g></svg></i>
            </nav>
            {% block content %}{% endblock content %}
        </section>
        <script>
            const allSideMenu=document.querySelectorAll('#sidebar .side-menu.top li a');
            allSideMenu.forEach(item=>{const li=item.parentElement;item.addEventListener('click',function(){
                allSideMenu.forEach(i=>{i.parentElement.classList.remove('active')});li.classList.add('active')
            })});
            const menuBar=document.querySelector('#content nav .bx.bx-menu');
            const sidebar=document.getElementById('sidebar');
            menuBar.addEventListener('click',function(){sidebar.classList.toggle('hide')});
            const allDropdownSide=document.querySelectorAll('.dropdown-nav-menu');
            const allDivider=document.querySelectorAll('#sidebar .divider');
            allDropdownSide.forEach(item=>{const a=item.parentElement.querySelector('a');
            a.addEventListener('click',function(e){e.preventDefault();
                if(!this.classList.contains('active')){
                    allDropdownSide.forEach(i=>{const aLink=i.parentElement.querySelector('a');
                    aLink.classList.remove('active');
                    i.classList.remove('show')})
                }
                item.classList.toggle('show');
                this.classList.toggle('active')
            })});
            const dropdownTodo=document.querySelectorAll('.dropdown-menu-todo');
            dropdownTodo.forEach(item=>{
                const icon=item.parentElement.querySelector('i');
                window.addEventListener('click',function(e){
                if(e.target!==icon&&e.target!==item){
                    if(item.classList.contains('active')){
                        item.classList.remove('active')}};
                });
                icon.addEventListener('click',function(){
                    if(!item.classList.contains('active')){
                        dropdownTodo.forEach(i=>{i.classList.remove('active')})
                    }
                    item.classList.toggle('active')
                })
            })
        </script>
        {% block script %}{% endblock script %}
    </body>
</html>
{% endspaceless %}
