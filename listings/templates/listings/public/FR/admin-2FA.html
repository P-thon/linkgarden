
{% extends 'listings/public/main.html' %}
{% load static %}
{% block head_inject %}
    <script src="{% static 'listings/JS/LIBRARY/aos.min.js'%}"></script>
    <link rel="stylesheet" href="{% static 'listings/CSS/admin-2FA.css'%}"/>
{% endblock head_inject %}
{% block content %}
<div class = "all-content">
    <div class = "main-2FA-container">
        <div class="centred ">
            <div class="text">2FA CODE</div>
        </div>
        <div id = "main_container_rgba">
            <form method="POST" target = "_self" class = "textleft">
                <p class = "form_text">
                    <input type = "submit" class = "form_button_left" name = "back" value = "< Retour">
                    {% csrf_token %}
                </p>
            </form>
            <div class = "centred">
                <div class="container">
                    <form method="POST" target = "_self" class = "main_form">
                        <h3 class = "titlepage">Code :</h3>
                        <div class = "otpcontainer">
                            <div class="otp-field" id = "input_shake">
                                <input type="text" maxlength="1" name="c1" required/>
                                <input type="text" maxlength="1" name="c2" required/>
                                <input type="text" maxlength="1" name="c3" required class="space"/>
                                <input type="text" maxlength="1" name="c4" required/>
                                <input type="text" maxlength="1" name="c5" required/>
                                <input type="text" maxlength="1" name="c6" required class="space"/>
                                <input type="text" maxlength="1" name="c7" required/>
                                <input type="text" maxlength="1" name="c8" required/>
                                <input type="text" maxlength="1" name="c9" required/>
                            </div>
                        </div>
                        {% csrf_token %}
                        <p class = "answer status-color">{{ status }}</p>
                        <div class ="centred">
                            <button type="submit" class="btnsubmit"><span>Vérifier</span></button>
                        </div>
                    </form>
                    <form method="POST" target = "_self" class = "mt10">
                        <p class="form_text mb25">
                            <input type = "submit" class = "resendemail" name = "resend" value = "Vous n'avez pas reçu l'email ? Renvoyer.">
                            {% csrf_token %}
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <button id = "top-button" class = "dn">^</button>
        <button id="language-button" class="fixed-language-menu dn">
            <p class = "seo-optimisation">Open language navbar</p>
            <svg version="1.0" xmlns="http://www.w3.org/2000/svg" width="18px" height="18px" viewBox="0 0 516.000000 516.000000" preserveAspectRatio="xMidYMid meet">
                <g transform="translate(0.000000,516.000000) scale(0.100000,-0.100000)" fill="#ffffff" stroke="none">

                </g>
            </svg>
        </button>
        <div id="language-overlay" class="language-overlay">
            <a class="close-btn" id = "close-language-menu">&times;</a>
            <div class="language-overlay-content">
                <form method="POST" target = "_self" class = "language-form">
                    {% csrf_token %}
                    <a><input type = "submit" name = "changelanguage" value = "French" class = "language-input"></a>
                    <a><input type = "submit" name = "changelanguage" value = "English" class = "language-input"></a>
                </form>
            </div>
        </div>
    </footer>
</div>
{% endblock content %}
{% block script %}
    <script src="{% static 'listings/JS/admin-2FA.js' %}"></script>
{% endblock script %}
